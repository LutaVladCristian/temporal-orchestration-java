services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: my-mssql-container
    environment:
      ACCEPT_EULA: Y
      SA_PASSWORD: MyStrongP@ssword1
      MSSQL_DB: SERVER_DB
    ports:
      - "1433:1433"
    volumes:
      - mssqldata:/var/opt/mssql

  app:
    build: .
    container_name: my-spring-server-container
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:sqlserver://db:1433;databaseName=SERVER_DB;encrypt=false
      SPRING_DATASOURCE_USERNAME: sa
      SPRING_DATASOURCE_PASSWORD: MyStrongP@ssword1


volumes:
  mssqldata:
